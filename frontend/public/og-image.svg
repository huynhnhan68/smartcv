  <rect x="514" y="430" width="220" height="44" rx="22" fill="#534ab7" fill-opacity="0.3"/>
  <text x="624" y="457" font-family="system-ui,sans-serif" font-size="18" fill="#a89ff0" text-anchor="middle">Resume Tracking</text>

