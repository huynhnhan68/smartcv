<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartCV</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // Stores the full path (including the '/SmartCV' base) in sessionStorage,
    // then redirects to the app's index.html. index.html reads it back and
    // restores the EXACT original URL via history.replaceState.
    //
    // Bug fix: this used to strip '/SmartCV' before storing the route, then
    // redirect to '/SmartCV/'. index.html's restore script wrote that
    // stripped, base-less route (e.g. '/board') straight to the address bar
    // with nothing to re-add the base - so a hard refresh on
    // huynhnhan68.com/SmartCV/board silently became huynhnhan68.com/board, which
    // didn't match any route under BrowserRouter's basename="/SmartCV" and
    // rendered a blank page. Storing the FULL original path here (base
    // included) and restoring it verbatim in index.html removes the mismatch -
    // there's now a single source of truth for the base path instead of two
    // scripts disagreeing about it.
    var base = '/SmartCV';
    sessionStorage.setItem('redirect', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace(base + '/');
  </script>
</head>
<body></body>
</html>
