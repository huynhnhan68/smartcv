name: Applytic CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  AWS_REGION: us-east-1
  FRONTEND_BUCKET: applytic-frontend-298199649406
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:

  # 
  test:
    name: Run pytest + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lambdas/requirements.txt

      - name: Install test dependencies
        run: |
          pip install pytest boto3 pydantic aws-lambda-powertools pytest-cov
          pip install "moto[dynamodb,s3,ses,cognitoidp]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=lambdas --cov-report=term-missing --cov-fail-under=70

  # 
  test-frontend:
    name: Run Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm run test

  # 
  validate-openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator
        run: pip install openapi-spec-validator pyyaml

      - name: Validate api/openapi.yml
        run: |
          python -c "
          from openapi_spec_validator import validate_spec
          import yaml
          with open('api/openapi.yml') as f:
              spec = yaml.safe_load(f)
          validate_spec(spec)
          print('OpenAPI spec is valid')
          "

  # 
  deploy-backend:
    name: Deploy CDK stack
    runs-on: ubuntu-latest
    needs: [test, test-frontend, validate-openapi]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (for layer build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lambdas/shared_layer/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda Layer
        run: bash scripts/build_layer.sh

      - name: Install CDK dependencies
        run: cd cdk && npm ci

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Deploy CDK stack
        run: cd cdk && cdk deploy --require-approval never

  # 
    name: Deploy frontend to AWS
    runs-on: ubuntu-latest
    needs: [test, test-frontend, validate-openapi]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend (CloudFront - base path /)
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
          VITE_BASE_PATH: /

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ env.FRONTEND_BUCKET }} --delete

      - name: Deploy API docs to S3
        run: aws s3 sync api-docs/ s3://${{ env.FRONTEND_BUCKET }}/api/docs/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # 
  deploy-frontend-pages:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, test-frontend, validate-openapi]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      id-token: write
      contents: read
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend (GitHub Pages - base path /smartcv/)
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
          VITE_AWS_REGION: us-east-1
          VITE_BASE_PATH: /smartcv/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
